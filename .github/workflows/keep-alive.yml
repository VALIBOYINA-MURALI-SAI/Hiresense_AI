name: Keep Streamlit Cloud Alive

on:
  schedule:
    # Every 30 minutes, 24/7. Streamlit Community Cloud sleeps after ~7 days
    # of inactivity; periodic pings prevent that.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app
        # Replace the URL below with your actual Streamlit Cloud app URL.
        # Alternatively, use UptimeRobot (free) for the same effect with a
        # dashboard and alerting: https://uptimerobot.com
        run: |
          curl -sS -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n" \
            "${{ vars.STREAMLIT_APP_URL || 'https://hiresense-ai.streamlit.app' }}"
